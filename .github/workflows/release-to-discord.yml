name: 發布新版本到 Discord

# 觸發時機：每當有 release 被「發布」時自動執行
on:
  release:
    types: [published]

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: 整理 release 資訊並發送到 Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          TAG: ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          BODY: ${{ github.event.release.body }}
          URL: ${{ github.event.release.html_url }}
          AUTHOR: ${{ github.event.release.author.login }}
          PUBLISHED: ${{ github.event.release.published_at }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          webhook = os.environ["DISCORD_WEBHOOK"]
          tag       = os.environ.get("TAG") or "(未知版本)"
          name      = os.environ.get("NAME") or tag
          body      = os.environ.get("BODY") or ""
          url       = os.environ.get("URL") or ""
          author    = os.environ.get("AUTHOR") or "開發者"
          published = (os.environ.get("PUBLISHED") or "")[:10]  # 只取日期 YYYY-MM-DD

          # 更新說明過長就截斷 (Discord embed description 上限 4096 字)
          notes = body.strip() or "(這次沒有填寫更新說明，詳情請點上方標題連結查看)"
          if len(notes) > 3800:
              notes = notes[:3800] + "\n\n…(更新說明過長，已截斷，完整內容請點上方連結)"

          embed = {
              "title": f"🎉 新版本發布：{name}",
              "url": url,
              "description": notes,
              "color": 3066993,  # 綠色
              "fields": [
                  {"name": "📌 版本", "value": tag, "inline": True},
                  {"name": "📅 發布日期", "value": published, "inline": True},
              ],
              "footer": {"text": f"發布者 {author} ・ 繁星仙境輔助助手"},
          }
          payload = {
              "content": "@everyone 輔助助手有新版本囉！記得更新 ⬇️",
              "embeds": [embed],
              # 限制 @everyone 只能 ping everyone，避免誤 ping 其他人
              "allowed_mentions": {"parse": ["everyone"]},
          }

          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              webhook, data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              print(f"Discord 回應狀態碼: {resp.status}")
              print("✅ 版本公告已送出！")
          PYEOF
