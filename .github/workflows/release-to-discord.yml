name: 發布新版本到 Discord

# 觸發時機：每當有 release 被「發布」時自動執行
on:
  release:
    types: [published]

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: 整理 release 資訊並發送到 Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          TAG: ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          BODY: ${{ github.event.release.body }}
          URL: ${{ github.event.release.html_url }}
          AUTHOR: ${{ github.event.release.author.login }}
          PUBLISHED: ${{ github.event.release.published_at }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          webhook = os.environ["DISCORD_WEBHOOK"]

          # 📌 論壇頻道：把公告都發到這個固定貼文 (thread) 裡
          THREAD_ID = "1507383354843070485"
          if THREAD_ID:
              sep = "&" if "?" in webhook else "?"
              webhook = f"{webhook}{sep}thread_id={THREAD_ID}"

          tag       = os.environ.get("TAG") or "(未知版本)"
          body      = os.environ.get("BODY") or ""

          # 更新項目內容 (直接用你在 GitHub release 說明欄寫的內容)
          notes = body.strip() or "* (這次沒有填寫更新項目)"

          # 標題：## <自訂表情> 乙太助手 v版本號 更新
          #       底下直接接更新項目
          message = f"## <a:1485675590529843310:1491388875669504132> 乙太助手 {tag} 更新\n{notes}"

          # Discord 單則訊息上限 2000 字，超過就截斷
          if len(message) > 1950:
              message = message[:1950] + "\n…(內容過長已截斷)"

          payload = {
              "content": message,
              # 不提及任何人，避免 @everyone 權限不足導致 403
              "allowed_mentions": {"parse": []},
          }

          data = json.dumps(payload).encode("utf-8")

          # 🔍 診斷：確認 webhook 有沒有正確抓到 (只顯示開頭，不洩漏完整網址)
          if not webhook:
              print("❌ 錯誤：DISCORD_WEBHOOK 是空的！代表 GitHub Secret 沒設好或名稱不符。")
              print("   請確認 repo Settings → Secrets → 有一個名為 DISCORD_RELEASE_WEBHOOK 的 secret。")
              raise SystemExit(1)
          print(f"🔍 webhook 長度: {len(webhook)} 字元")
          print(f"🔍 webhook 開頭: {webhook[:40]}...")
          print(f"🔍 格式檢查 (應以 https://discord.com/api/webhooks/ 開頭): "
                f"{'✅ 正確' if webhook.startswith('https://discord.com/api/webhooks/') else '❌ 格式不對'}")

          req = urllib.request.Request(
              webhook, data=data,
              headers={
                  "Content-Type": "application/json",
                  # 🔑 必須帶 User-Agent，否則會被 Discord 前面的 Cloudflare 以 error 1010 擋下
                  "User-Agent": "StarRO-Release-Bot/1.0 (+https://github.com/sc220371/Bot-Update-Server)",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Discord 回應狀態碼: {resp.status}")
                  print("✅ 版本公告已送出！")
          except urllib.error.HTTPError as e:
              # 印出 Discord 回傳的具體錯誤內容，方便判斷原因
              err_body = e.read().decode("utf-8", errors="replace")
              print(f"❌ Discord 拒絕，狀態碼 {e.code}")
              print(f"❌ Discord 回應內容: {err_body}")
              raise
          PYEOF
